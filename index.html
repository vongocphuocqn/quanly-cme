<script type="module">
  // ====== KẾT NỐI FIREBASE ======
  // KHÔNG cần sửa file này. Nếu chưa cấu hình, ứng dụng sẽ tự hiện màn hình
  // cho anh dán đoạn firebaseConfig (lấy từ Firebase Console) ngay trên trình duyệt.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const LS_KEY = 'cnkt_firebase_config_v1';
  const PLACEHOLDER = {
    apiKey: "AIzaSyAxHONXeW5fEIWGD5MsVlBgv1WXPorpeJw",
    authDomain: "capnhatsotinchi-bvdktt-gialai.firebaseapp.com",
    projectId: "capnhatsotinchi-bvdktt-gialai",
    storageBucket: "capnhatsotinchi-bvdktt-gialai.firebasestorage.app",
    messagingSenderId: "984427508625",
    appId: "1:984427508625:web:d756933d6f6205c716e030"
  };

  function sanitizeKey(key){ return String(key).replace(/\//g, '__SLASH__'); }

  function loadSavedConfig(){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (obj && obj.apiKey && obj.projectId) return obj;
    } catch(e){}
    return null;
  }

  // Hàm này được màn hình thiết lập (trong file) gọi khi anh bấm "Lưu & Tiếp tục"
  window.__cnktSaveFirebaseConfig = function(text){
    if (!text){
      throw new Error('Ô dán đang TRỐNG. Dòng chữ xám anh thấy trong ô chỉ là ví dụ minh hoạ (placeholder), không phải nội dung thật — hãy bấm vào ô rồi dán (Ctrl+V) đoạn firebaseConfig thật lấy từ Firebase Console của anh vào đó.');
    }
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start === -1 || end === -1 || end < start){
      throw new Error('Không tìm thấy dấu { } trong nội dung đã dán. Hãy dán đúng đoạn mã firebaseConfig Firebase đưa ra.');
    }
    const objText = text.slice(start, end + 1);
    let obj;
    try {
      // eslint-disable-next-line no-new-func
      obj = (new Function('return (' + objText + ');'))();
    } catch (e) {
      throw new Error('Không đọc được nội dung đã dán. Hãy kiểm tra lại đã copy đủ và đúng cú pháp từ Firebase Console.');
    }
    if (!obj || !obj.apiKey || !obj.projectId){
      throw new Error('Thiếu apiKey hoặc projectId trong nội dung đã dán. Hãy copy đầy đủ đoạn config.');
    }
    if (String(obj.apiKey).trim() === '...' || String(obj.projectId).trim() === '...'){
      throw new Error('Nội dung đã dán vẫn còn là VÍ DỤ MẪU (giá trị "..."), chưa phải thông tin thật của project Firebase anh đã tạo. Hãy lấy đúng đoạn config thật từ Firebase Console (Project Overview → biểu tượng </> → Register app).');
    }
    localStorage.setItem(LS_KEY, JSON.stringify(obj));
  };
  window.__cnktClearFirebaseConfig = function(){ localStorage.removeItem(LS_KEY); };

  const savedConfig = loadSavedConfig();
  const firebaseConfig = savedConfig || PLACEHOLDER;
  const isPlaceholder = String(firebaseConfig.apiKey || '').indexOf('DAN_') === 0;

  if (isPlaceholder){
    window.__cnktConfigMissing = true;
    window.dispatchEvent(new Event('cnkt-storage-ready'));
  } else {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COL = 'cnkt_kv';
    window.storage = {
      get: async function(key, shared){
        const ref = doc(db, COL, sanitizeKey(key));
        const snap = await getDoc(ref);
        if (!snap.exists()) throw new Error('Không tìm thấy khoá: ' + key);
        const data = snap.data();
        return { key: key, value: data.value, shared: !!shared };
      },
      set: async function(key, value, shared){
        const ref = doc(db, COL, sanitizeKey(key));
        await setDoc(ref, { key: String(key), value: value, shared: !!shared, updatedAt: Date.now() });
        return { key: key, value: value, shared: !!shared };
      },
      delete: async function(key, shared){
        const ref = doc(db, COL, sanitizeKey(key));
        await deleteDoc(ref).catch(()=>{});
        return { key: key, deleted: true, shared: !!shared };
      },
      list: async function(prefix, shared){
        const colRef = collection(db, COL);
        let snaps;
        if (prefix){
          snaps = await getDocs(query(colRef, where('key','>=',prefix), where('key','<', prefix + '\uf8ff')));
        } else {
          snaps = await getDocs(colRef);
        }
        const keys = [];
        snaps.forEach(d=>keys.push(d.data().key));
        return { keys: keys, prefix: prefix, shared: !!shared };
      }
    };
    window.dispatchEvent(new Event('cnkt-storage-ready'));
  }
</script>

  // ---------- ô chọn có tìm kiếm (dùng cho danh sách dài: đơn vị, nhân viên...) ----------
  function createSearchableSelect(container, options, cfg){
    cfg = cfg || {};
    const placeholder = cfg.placeholder || 'Gõ để tìm...';
    let selectedId = cfg.initialId || '';
    container.innerHTML = `<div class="ssel"><input class="ssel-input" type="text" placeholder="${placeholder}" autocomplete="off" /><div class="ssel-list" style="display:none"></div></div>`;
    const input = container.querySelector('.ssel-input');
    const list = container.querySelector('.ssel-list');
    if (selectedId){
      const found = options.find(o=>o.id===selectedId);
      if (found) input.value = found.label;
    }
    function renderList(query){
      const q = (query||'').trim().toLowerCase();
      const filtered = q ? options.filter(o=> o.label.toLowerCase().includes(q)) : options;
      const shown = filtered.slice(0, 100);
      if (!shown.length){
        list.innerHTML = `<div class="ssel-empty">Không tìm thấy kết quả phù hợp.</div>`;
      } else {
        list.innerHTML = shown.map(o=>`<div class="ssel-item${o.isAction?' new':''}" data-id="${o.id}">${o.label}</div>`).join('');
      }
      list.style.display = 'block';
      list.querySelectorAll('.ssel-item').forEach(it=>{
        it.onmousedown = function(e){
          e.preventDefault();
          const id = it.getAttribute('data-id');
          const opt = options.find(o=>o.id===id);
          selectedId = id;
          input.value = opt ? opt.label : '';
          list.style.display = 'none';
          if (cfg.onSelect) cfg.onSelect(id, opt);
        };
      });
    }
    input.addEventListener('focus', function(){ renderList(''); });
    input.addEventListener('input', function(){ selectedId=''; renderList(input.value); if (cfg.onSelect) cfg.onSelect('', null); });
    input.addEventListener('blur', function(){ setTimeout(function(){ list.style.display='none'; }, 150); });
    return { getValue: function(){ return selectedId; } };
  }

  // ---------- đọc & nén file ảnh (hoặc giữ nguyên PDF) thành base64 để lưu kèm bằng chứng ----------
  function computeBlurScore(canvas){
    const w = 220;
    const h = Math.max(1, Math.round(canvas.height * w / canvas.width));
    const c2 = document.createElement('canvas');
    c2.width = w; c2.height = h;
    const ctx2 = c2.getContext('2d');
    ctx2.drawImage(canvas, 0, 0, w, h);
    const data = ctx2.getImageData(0,0,w,h).data;
    const gray = new Float32Array(w*h);
    for (let i=0;i<w*h;i++){
      gray[i] = 0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2];
    }
    let sum=0, sumSq=0, count=0;
    for (let y=1;y<h-1;y++){
      for (let x=1;x<w-1;x++){
        const idx = y*w+x;
        const lap = gray[idx-1] + gray[idx+1] + gray[idx-w] + gray[idx+w] - 4*gray[idx];
        sum += lap; sumSq += lap*lap; count++;
      }
    }
    const mean = sum/count;
    return (sumSq/count) - mean*mean; // điểm cao = ảnh nét hơn
  }

  function readFileAsCompressedDataURL(file){
    return new Promise(function(resolve, reject){
      if (file.size > 8 * 1024 * 1024){ reject(new Error('File quá lớn (tối đa 8MB).')); return; }
      if (file.type === 'application/pdf'){
        const reader = new FileReader();
        reader.onload = function(){ resolve({ dataUrl: reader.result, type: 'pdf', name: file.name }); };
        reader.onerror = function(){ reject(new Error('Lỗi đọc file PDF.')); };
        reader.readAsDataURL(file);
        return;
      }
      const reader = new FileReader();
      reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
          const MIN_DIM = 500;
          if (img.width < MIN_DIM && img.height < MIN_DIM){
            reject(new Error('Ảnh có độ phân giải quá thấp (' + img.width + '×' + img.height + 'px). Vui lòng chụp lại với độ phân giải cao hơn, đảm bảo nhìn rõ chữ trên giấy chứng nhận.'));
            return;
          }
          const maxW = 1280;
          let w = img.width, h = img.height;
          if (w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const blurScore = computeBlurScore(canvas);
          const isBlurry = blurScore < 18;
          resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.72), type: 'image', name: file.name, width: img.width, height: img.height, blurScore, isBlurry });
        };
        img.onerror = function(){ reject(new Error('Lỗi đọc ảnh.')); };
        img.src = e.target.result;
      };
      reader.onerror = function(){ reject(new Error('Lỗi đọc file.')); };
      reader.readAsDataURL(file);
    });
  }

  function monthsBetween(a,b){ const d1=new Date(a), d2=new Date(b); return (d2.getFullYear()-d1.getFullYear())*12 + (d2.getMonth()-d1.getMonth()); }

  function cycleInfo(emp, refDate){
    refDate = refDate || todayISO();
    const start = emp.ngayBatDauChuKy || emp.ngayCapCCHN || refDate;
    const end = addYears(start, CYCLE_YEARS);
    const totalMonths = CYCLE_YEARS*12;
    let monthsElapsed = monthsBetween(start, refDate);
    if (monthsElapsed < 0) monthsElapsed = 0;
    if (monthsElapsed > totalMonths) monthsElapsed = totalMonths;
    const monthsRemaining = totalMonths - monthsElapsed;
    return { start, end, monthsElapsed, monthsRemaining, totalMonths };
  }

  function statusOf(achievedHours, emp, refDate){
    const ci = cycleInfo(emp, refDate);
    const percent = achievedHours / REQUIRED_HOURS;
    const expectedPercent = ci.monthsElapsed / ci.totalMonths;
    if (percent >= 1) return { key:'du', label:'Đã đủ giờ', color:'green' };
    if (ci.monthsRemaining <= 6) return { key:'nguyco', label:'Nguy cơ chưa đủ giờ', color:'red' };
    if (percent < expectedPercent - 0.15) return { key:'chuy', label:'Cần chú ý — chậm tiến độ', color:'amber' };
    return { key:'binhthuong', label:'Đang thực hiện', color:'green' };
  }

  // ---------- cached achieved hours per employee (loaded async on demand) ----------
  let hoursCache = {}; // empId -> { hours, activities }
  async function ensureHours(empId){
    if (hoursCache[empId]) return hoursCache[empId];
    const acts = await getActivities(empId);
    const hours = acts.reduce((s,a)=> s + (parseFloat(a.soGioTinChi)||0), 0);
    hoursCache[empId] = { hours, activities: acts };
    return hoursCache[empId];
  }
  function invalidateHours(empId){ delete hoursCache[empId]; }

  // Tải trước (song song, không tuần tự) dữ liệu hoạt động của nhiều nhân viên cùng lúc,
  // giúp các màn hình danh sách/tổng quan hiển thị nhanh hơn rất nhiều khi dùng Firebase
  // (đọc qua mạng), thay vì chờ từng người một như trước.
  async function warmHoursCache(empIds, onProgress){
    const todo = empIds.filter(id => !hoursCache[id]);
    if (!todo.length) return;
    const total = todo.length;
    let done = 0;
    if (onProgress) onProgress(0, total);
    const BATCH = 30;
    for (let i = 0; i < todo.length; i += BATCH){
      const batch = todo.slice(i, i + BATCH);
      await Promise.all(batch.map(async id => {
        try {
          const acts = await getActivities(id);
          const hours = acts.reduce((s,a)=> s + (parseFloat(a.soGioTinChi)||0), 0);
          hoursCache[id] = { hours, activities: acts };
        } catch(e){ hoursCache[id] = { hours: 0, activities: [] }; }
        done++;
        if (onProgress) onProgress(done, total);
      }));
    }
  }

  // Tính giờ tín chỉ và trạng thái CHỐT tại 1 ngày báo cáo (có thể là ngày quá khứ),
  // chỉ tính các hoạt động đã được xác nhận VÀ có ngày tham gia <= ngày báo cáo đó.
  async function ensureHoursAsOf(empId, refDate){
    const acts = hoursCache[empId] ? hoursCache[empId].activities : await getActivities(empId);
    const actsAsOf = refDate ? acts.filter(a=> !a.ngayThamGia || a.ngayThamGia <= refDate) : acts;
    const hours = actsAsOf.reduce((s,a)=> s + (parseFloat(a.soGioTinChi)||0), 0);
    return { hours, activities: actsAsOf };
  }

      const headers = ['STT','Họ tên','Giới tính','Ngày sinh','Chức danh','Trình độ CM','Số CCHN','Ngày cấp','Hạn chu kỳ','Giờ tín chỉ','Đã duyệt','Chờ duyệt','Từ chối','Trạng thái'];
      exportXlsxGeneric(headers, lastRowsData, 'danh_sach_nv_' + state.unitName.replace(/\s+/g,'_') + '_' + todayISO() + '.xlsx', 'NhanVien');
    };
    refresh();
    renderUnitApprovedList(document.getElementById('emp-tab-approved'));
    renderUnitPendingList(document.getElementById('emp-tab-pending'));
    renderUnitRejectedList(document.getElementById('emp-tab-rejected'));
  }

  async function renderEmpTable(wrap, list, editable, statusFilter, fromDate, toDate){
    if (!list.length){ wrap.innerHTML = `<div class="empty">Chưa có nhân viên nào. Hãy thêm nhân viên đầu tiên của khoa/phòng.</div>`; return []; }
    wrap.innerHTML = `<div class="empty">Đang tải dữ liệu giờ tín chỉ…</div>`;
    await warmHoursCache(list.map(e=>e.id));
    const rows = [];
    const rowsData = [];
    for (const emp of list){
      if (statusFilter === 'choduyet' && emp.trangThaiNhanVien !== 'Chờ duyệt') continue;
      const h = await ensureHours(emp.id);
      const st = statusOf(h.hours, emp);
      if (statusFilter && statusFilter !== 'choduyet' && st.key !== statusFilter) continue;
      const ci = cycleInfo(emp);
      if (fromDate && ci.end < fromDate) continue;
      if (toDate && ci.end > toDate) continue;
      const pct = Math.min(100, Math.round((h.hours/REQUIRED_HOURS)*100));
      const choDuyetNV = emp.trangThaiNhanVien === 'Chờ duyệt';
      const soChoDuyet = state.pending.filter(p=>p.empId===emp.id).length;
      const soTuChoi = state.rejectedLog.filter(p=>p.empId===emp.id).length;
      const stt = rows.length + 1;
      rows.push(`
        <tr>
          <td>${stt}</td>
          <td>${emp.hoTen}${choDuyetNV?' <span class="pill amber">Hồ sơ chờ duyệt</span>':''}</td>
          <td>${emp.gioiTinh||'—'}</td>
          <td style="white-space:nowrap">${fmtDate(emp.ngaySinh)}</td>
          <td>${emp.chucDanh}</td>
          <td>${emp.trinhDoCM||'—'}</td>
          <td>${emp.soCCHN||'—'}</td>
          <td style="white-space:nowrap">${fmtDate(emp.ngayCapCCHN)}</td>
          <td style="white-space:nowrap">${fmtDate(ci.end)}</td>
          <td>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${st.color==='green'?'#1f7a4d':st.color==='amber'?'#b3760a':'#a3271f'}"></div></div>
            <span style="font-family:Arial, sans-serif; font-size:12px;white-space:nowrap">${h.hours.toFixed(1)}&nbsp;/&nbsp;${REQUIRED_HOURS} giờ (${pct}%)</span>
          </td>
          <td><span class="pill green">${h.activities.length}</span></td>
          <td><span class="pill amber">${soChoDuyet}</span></td>
          <td><span class="pill red">${soTuChoi}</span></td>
          <td>${choDuyetNV?'<span class="pill gray">Chưa thể đăng nhập</span>':`<span class="pill ${st.color}">${st.label}</span>`}</td>
          <td style="white-space:nowrap">${editable?`<button class="ghost small-btn" data-edit-emp="${emp.id}">✏️ Sửa</button> <button class="ghost small-btn" data-view-emp="${emp.id}">👁️ Xem hoạt động</button>`:`<button class="ghost small-btn" data-view-emp="${emp.id}">👁️ Xem</button>`}</td>
        </tr>
      `);
      rowsData.push([stt, emp.hoTen, emp.gioiTinh||'', fmtDate(emp.ngaySinh), emp.chucDanh, emp.trinhDoCM||'', emp.soCCHN||'', fmtDate(emp.ngayCapCCHN), fmtDate(ci.end), h.hours.toFixed(1)+' / '+REQUIRED_HOURS, h.activities.length, soChoDuyet, soTuChoi, st.label]);
    }
    wrap.innerHTML = rows.length ? `
      <div class="scroll-table-wrap"><table>
        <thead><tr><th>STT</th><th>Họ và tên</th><th>Giới tính</th><th>Ngày sinh</th><th>Chức danh</th><th>Trình độ CM</th><th>Số CCHN</th><th>Ngày cấp</th><th>Hạn chu kỳ 5 năm</th><th>Tiến độ giờ tín chỉ</th><th>Đã duyệt</th><th>Chờ duyệt</th><th>Từ chối</th><th>Trạng thái</th><th></th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table></div>
    ` : `<div class="empty">Không có nhân viên phù hợp.</div>`;
    wrap.querySelectorAll('[data-edit-emp]').forEach(b=>{
      b.onclick = ()=> openEmployeeModal(b.getAttribute('data-edit-emp'), renderUnitApp);
    });
    wrap.querySelectorAll('[data-view-emp]').forEach(b=>{
      b.onclick = ()=> openActivityViewModal(b.getAttribute('data-view-emp'));
    });
    return rowsData;
  }

    const emp = empId ? state.employees.find(e=>e.id===empId) : null;
    const overlay = el(`<div class="modal-overlay"><div class="modal">
      <h3>${emp?'Sửa thông tin nhân viên':'Thêm nhân viên mới'}</h3>
      <div class="field"><label>Họ và tên</label><input id="m-hoten" value="${emp?emp.hoTen:''}" /></div>

      <div class="row-flex">
        <div class="field"><label>Giới tính</label>
          <select id="m-gioitinh">
            <option value="" ${emp&&!emp.gioiTinh?'selected':''}>— Chưa rõ —</option>
            <option value="Nam" ${emp&&emp.gioiTinh==='Nam'?'selected':''}>Nam</option>
            <option value="Nữ" ${emp&&emp.gioiTinh==='Nữ'?'selected':''}>Nữ</option>

          <select id="m-chucdanh">${CHUC_DANH.map(c=>`<option ${emp&&emp.chucDanh===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Trình độ chuyên môn</label>
          <select id="m-trinhdo">${TRINH_DO.map(c=>`<option ${emp&&emp.trinhDoCM===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
      </div>
      <div class="row-flex">
        <div class="field"><label>Số CCHN (nếu có)</label><input id="m-cchn" value="${emp?emp.soCCHN||'':''}" /></div>
        <div class="field"><label>Ngày cấp CCHN</label><input id="m-ngaycap" type="date" value="${emp?emp.ngayCapCCHN||'':''}" /></div>
      </div>
      <div class="field"><label>Ngày bắt đầu chu kỳ 5 năm (mặc định = ngày cấp CCHN)</label><input id="m-batdau" type="date" value="${emp?emp.ngayBatDauChuKy||'':''}" /></div>
      <div class="row-flex" style="justify-content:flex-end;margin-top:10px">
        ${emp?`<button class="danger" id="m-delete">Xoá nhân viên</button>`:''}
        <button class="secondary" id="m-cancel">Hủy</button>
        <button id="m-save">Lưu</button>
      </div>
    </div></div>`);
    root.appendChild(overlay);
    let selectedDonViId = emp ? emp.donViId : '';
    if (state.role === 'admin'){
      const donViOptions = state.config.units.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(u=>({ id:u.id, label:u.name }));
      createSearchableSelect(overlay.querySelector('#m-donvi-ssel'), donViOptions, {
        placeholder: 'Gõ để tìm Khoa/Phòng...',
        initialId: selectedDonViId,
        onSelect: (id)=>{ selectedDonViId = id; }
      });
    }
    overlay.querySelector('#m-cancel').onclick = ()=> overlay.remove();
    if (emp) overlay.querySelector('#m-delete').onclick = async ()=>{
      if (!confirm('Xoá nhân viên này và toàn bộ dữ liệu hoạt động CNKT liên quan?')) return;
      state.employees = state.employees.filter(e=>e.id!==emp.id);
      await saveEmployees();
      await window.storage.delete('activities:'+emp.id, true).catch(()=>{});
      overlay.remove(); onDone();
    };
    overlay.querySelector('#m-save').onclick = async ()=>{
      const hoTen = overlay.querySelector('#m-hoten').value.trim();
      if (!hoTen){ alert('Vui lòng nhập họ và tên.'); return; }
      if (state.role === 'admin' && !selectedDonViId){ alert('Vui lòng chọn Khoa/Phòng cho nhân viên.'); return; }
      const data = {
        hoTen,
        gioiTinh: overlay.querySelector('#m-gioitinh').value,
        ngaySinh: overlay.querySelector('#m-ngaysinh').value,
        chucDanh: overlay.querySelector('#m-chucdanh').value,
        trinhDoCM: overlay.querySelector('#m-trinhdo').value,
        soCCHN: overlay.querySelector('#m-cchn').value.trim(),
        ngayCapCCHN: overlay.querySelector('#m-ngaycap').value,
        ngayBatDauChuKy: overlay.querySelector('#m-batdau').value || overlay.querySelector('#m-ngaycap').value,
        donViId: state.role==='admin' ? selectedDonViId : (state.unitId || (emp ? emp.donViId : '')),
      };
      if (emp){
        Object.assign(emp, data);
        if (state.role === 'admin') emp.trangThaiNhanVien = 'Đã duyệt';
      } else {
        const trangThai = (state.role === 'unit') ? 'Chờ duyệt' : 'Đã duyệt';
        state.employees.push(Object.assign({ id: uid('emp'), createdAt: todayISO(), trangThaiNhanVien: trangThai }, data));
      }
      await saveEmployees();
      overlay.remove();
      onDone();
      if (state.role === 'unit' && !emp) showToast('Đã gửi yêu cầu thêm nhân viên — chờ Phòng Chỉ đạo tuyến duyệt.');
    };
  }

    async function handleFileChosen(e){
      const file = e.target.files[0];
      const preview = document.getElementById('f-file-preview');
      if (!file){ pendingFile = null; preview.innerHTML=''; return; }
      preview.innerHTML = `<span class="muted">Đang xử lý và kiểm tra độ rõ của ảnh…</span>`;
      try {
        pendingFile = await readFileAsCompressedDataURL(file);
        if (pendingFile.type === 'image'){
          let warningHtml = '';
          if (pendingFile.isBlurry){
            warningHtml = `
              <div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:6px;padding:10px 12px;margin-bottom:8px">
                <b style="color:var(--amber)">⚠ Ảnh có thể bị mờ hoặc thiếu chi tiết.</b>

                <label style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:13px;font-weight:normal">
                  <input type="checkbox" id="f-blur-confirm" style="width:auto" /> Tôi xác nhận ảnh này vẫn đọc rõ được nội dung
                </label>
              </div>`;
          }
          preview.innerHTML = warningHtml + `<img src="${pendingFile.dataUrl}" style="max-height:140px;border:1px solid var(--line);border-radius:6px" />`;
          if (pendingFile.isBlurry){
            document.getElementById('f-blur-confirm').onchange = (ev)=>{ pendingFile.blurConfirmed = ev.target.checked; };
          }
        } else {
          preview.innerHTML = `<span class="pill gray">📄 ${pendingFile.name}</span>`;
        }
      } catch(err){
        preview.innerHTML = `<div style="color:var(--red);font-size:13px">⚠ ${err.message}</div>`;
        pendingFile = null;
        e.target.value = '';
      }
    }
    document.getElementById('f-file-camera').onchange = handleFileChosen;
    document.getElementById('f-file-picker').onchange = handleFileChosen;
    function showFormError(msg, fieldIds){
      const box = document.getElementById('f-error');
      box.textContent = '⚠ ' + msg;
      box.style.display = 'block';
      box.scrollIntoView({ behavior:'smooth', block:'center' });
      document.querySelectorAll('#f-ten, #f-gio').forEach(el=> el.style.borderColor = '');
      (fieldIds||[]).forEach(id=>{ const el = document.getElementById(id); if (el) el.style.borderColor = 'var(--red)'; });
    }
    function resetFormFields(){
      document.getElementById('f-ten').value = '';
      document.getElementById('f-donvi').value = '';
      document.getElementById('f-gio').value = '';
      document.getElementById('f-bangchung').value = '';
      document.getElementById('f-file-camera').value = '';
      document.getElementById('f-file-picker').value = '';
      document.getElementById('f-file-preview').innerHTML = '';
      document.getElementById('link-block').style.display = 'none';
      pendingFile = null;
    }
    function buildRecordFromForm(){
      const ten = document.getElementById('f-ten').value.trim();
      const gio = parseFloat(document.getElementById('f-gio').value);
      const bangChungText = document.getElementById('f-bangchung').value.trim();
      if (!ten){ showFormError('Vui lòng nhập Tên hoạt động / khóa học / hội nghị.', ['f-ten']); return null; }
      if (!gio || gio<=0){ showFormError('Vui lòng nhập Số giờ tín chỉ quy đổi hợp lệ (lớn hơn 0).', ['f-gio']); return null; }
      if (!bangChungText && !pendingFile){ showFormError('Vui lòng nhập số chứng nhận/đường link, hoặc đính kèm ảnh/file chứng nhận trước khi gửi.'); return null; }
      if (pendingFile && pendingFile.isBlurry && !pendingFile.blurConfirmed){ showFormError('Ảnh đính kèm có thể bị mờ. Vui lòng chụp lại ảnh rõ hơn, hoặc tích xác nhận "ảnh vẫn đọc rõ được" ở trên trước khi gửi.'); return null; }
      document.getElementById('f-error').style.display = 'none';
      return {
        _draftId: uid('draft'),
        loaiHinh: document.getElementById('f-loaihinh').value,
        tenHoatDong: ten,
        donViToChuc: document.getElementById('f-donvi').value.trim(),
        ngayThamGia: document.getElementById('f-ngay').value,
        soGioTinChi: gio,
        bangChung: bangChungText,
        bangChungFile: pendingFile ? pendingFile.dataUrl : '',
        bangChungFileType: pendingFile ? pendingFile.type : '',
        bangChungFileName: pendingFile ? pendingFile.name : '',
        bangChungFileBlurFlag: pendingFile ? !!pendingFile.isBlurry : false,
      };
    }
    async function submitDraftList(){
      const emp = state.employees.find(e=>e.id===empId);
      const uName = (state.config.units.find(u=>u.id===emp.donViId)||{}).name || state.unitName || '';
      draftList.forEach(d=>{
        state.pending.push(Object.assign({}, d, {
          id: uid('act'), empId, empName: emp.hoTen, donViId: emp.donViId || state.unitId, donViName: uName,
          trangThai: 'Chờ duyệt', submittedAt: todayISO(),
        }));
      });
      await savePending();
      showToast('Đã gửi ' + draftList.length + ' đợt lên Phòng Chỉ đạo tuyến.');
      if (onSubmitted) onSubmitted(); else renderUnitRecord(document.getElementById('tab-content'));
    }
    function renderDraftWrap(){
      const dwrap = document.getElementById('f-draft-wrap');
      if (!draftList.length){ dwrap.innerHTML = `<p class="muted">Chưa có đợt nào trong danh sách — điền form trên rồi bấm "➕ Thêm vào danh sách" để thêm từng đợt, sau đó gửi tất cả 1 lần.</p>`; return; }
      dwrap.innerHTML = `
        <h3 style="font-size:15px">Danh sách đợt đã thêm (${draftList.length})</h3>
        <table>
          <thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày</th><th>Giờ</th><th>Bằng chứng</th><th></th></tr></thead>
          <tbody>${draftList.map(d=>`
            <tr>
              <td>${d.loaiHinh}</td><td>${d.tenHoatDong}</td><td>${fmtDate(d.ngayThamGia)}</td><td>${d.soGioTinChi}</td>
              <td>${d.bangChung || (d.bangChungFile? '📎 Có file':'—')}</td>
              <td><button class="ghost small-btn" data-remove-draft="${d._draftId}">🗑️ Xoá</button></td>
            </tr>
          `).join('')}</tbody>
        </table>
        <button id="f-submit-all" style="margin-top:10px">📤 Gửi tất cả (${draftList.length} đợt) lên Phòng Chỉ đạo tuyến</button>
        <p class="muted" style="margin-top:8px">Các hoạt động sẽ ở trạng thái "Chờ duyệt" cho đến khi Phòng Chỉ đạo tuyến xác nhận giờ tín chỉ.</p>
      `;
      dwrap.querySelectorAll('[data-remove-draft]').forEach(b=>{
        b.onclick = ()=>{ draftList = draftList.filter(d=>d._draftId!==b.getAttribute('data-remove-draft')); renderDraftWrap(); };
      });
      document.getElementById('f-submit-all').onclick = submitDraftList;
    }
    document.getElementById('f-add-draft').onclick = ()=>{
      const rec = buildRecordFromForm();
      if (!rec) return;
      draftList.push(rec);
      resetFormFields();
      renderDraftWrap();
      showToast('Đã thêm 1 đợt vào danh sách — anh có thể nhập tiếp đợt khác.');
    };
    document.getElementById('f-submit-now').onclick = async ()=>{
      const rec = buildRecordFromForm();
      if (!rec) return;
      draftList.push(rec);
      await submitDraftList();
    };
    renderDraftWrap();
  }

  function renderUnitPendingList(wrap, fromDate, toDate){
    let mine = state.pending.filter(p=>p.donViId===state.unitId).sort((a,b)=> b.submittedAt.localeCompare(a.submittedAt));
    if (fromDate) mine = mine.filter(p=> !p.ngayThamGia || p.ngayThamGia >= fromDate);
    if (toDate) mine = mine.filter(p=> !p.ngayThamGia || p.ngayThamGia <= toDate);
    if (!mine.length){ wrap.innerHTML = `<div class="empty">Không có hoạt động phù hợp.</div>`; return; }
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Nhân viên</th><th>Hoạt động</th><th>Hình thức</th><th>Ngày</th><th>Giờ tín chỉ</th><th>Bằng chứng</th><th>Trạng thái</th></tr></thead>
        <tbody>${mine.map(p=>`
          <tr>
            <td>${p.empName}</td><td>${p.tenHoatDong}</td><td>${p.loaiHinh}</td><td>${fmtDate(p.ngayThamGia)}</td><td>${p.soGioTinChi}</td>
            <td>${p.bangChungFile? '📎 Có file' : (p.bangChung? '🔗 ' + p.bangChung : '—')}</td>
            <td><span class="pill amber">Chờ duyệt</span></td>
          </tr>
        `).join('')}</tbody>
      </table>
    `;
  }

  async function openActivityViewModal(empId){
    const emp = state.employees.find(e=>e.id===empId);
    const acts = await getActivities(empId);
    const overlay = el(`<div class="modal-overlay"><div class="modal" style="max-width:720px">
      <h3>Hoạt động CNKT đã xác nhận — ${emp.hoTen}</h3>
      ${acts.length? `<table><thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày</th><th>Giờ tín chỉ</th><th>Bằng chứng</th></tr></thead>
      <tbody>${acts.map((a,i)=>`<tr><td>${a.loaiHinh}</td><td>${a.tenHoatDong}</td><td>${fmtDate(a.ngayThamGia)}</td><td>${a.soGioTinChi}</td>
        <td>${a.bangChung||'—'}${a.bangChungFile?`<br><button class="ghost small-btn" style="margin-top:4px" data-view-act-file="${i}">📎 Xem file</button>`:''}</td></tr>`).join('')}</tbody></table>`
      : `<div class="empty">Chưa có hoạt động nào được xác nhận.</div>`}
      <div style="text-align:right;margin-top:14px"><button class="secondary" id="m-close">Đóng</button></div>
    </div></div>`);
    root.appendChild(overlay);
    overlay.querySelector('#m-close').onclick = ()=> overlay.remove();
    overlay.querySelectorAll('[data-view-act-file]').forEach(b=>{
      b.onclick = ()=>{
        const a = acts[parseInt(b.getAttribute('data-view-act-file'),10)];
        if (a) openFilePreviewModal(a.bangChungFile, a.bangChungFileType, a.bangChungFileName);
      };
    });
  }

  function openReasonModal(title, label, onConfirm){
    const overlay = el(`<div class="modal-overlay"><div class="modal" style="max-width:480px">
      <h3>${title}</h3>
      <div class="field"><label>${label}</label><textarea id="rm-reason" rows="3"></textarea></div>
      <div id="rm-error" style="display:none;color:var(--red);font-family:Arial,sans-serif;font-size:13px;margin-bottom:8px">⚠ Vui lòng nhập lý do.</div>
      <div class="row-flex" style="justify-content:flex-end">
        <button class="secondary" id="rm-cancel">Hủy</button>
        <button class="danger" id="rm-confirm">Xác nhận</button>
      </div>
    </div></div>`);
    root.appendChild(overlay);
    overlay.querySelector('#rm-cancel').onclick = ()=> overlay.remove();
    overlay.querySelector('#rm-confirm').onclick = async ()=>{
      const reason = overlay.querySelector('#rm-reason').value.trim();
      if (!reason){ overlay.querySelector('#rm-error').style.display = 'block'; return; }
      overlay.remove();
      await onConfirm(reason);
    };
  }

  function openFilePreviewModal(dataUrl, type, name){
    if (!dataUrl) return;
    const body = type === 'pdf'
      ? `<p class="muted">File PDF: ${name||''}</p><a href="${dataUrl}" download="${name||'tai-lieu.pdf'}" target="_blank"><button>Mở / Tải file PDF</button></a>`
      : `<img src="${dataUrl}" style="max-width:100%;max-height:70vh;border-radius:6px;border:1px solid var(--line)" />`;
    const overlay = el(`<div class="modal-overlay"><div class="modal" style="max-width:600px;text-align:center">
      <h3>Bằng chứng đính kèm</h3>
      ${body}
      <div style="text-align:right;margin-top:14px"><button class="secondary" id="m-fp-close">Đóng</button></div>
    </div></div>`);
    root.appendChild(overlay);
    overlay.querySelector('#m-fp-close').onclick = ()=> overlay.remove();
  }


  // ============ EMPLOYEE APP (Nhân viên tự đăng nhập) ============
  function renderEmployeeApp(){
    const emp = state.employees.find(e=>e.id===state.employeeId);
    if (!emp){ logout(); return; }
    const tabs = [
      { key:'hoso', label:'🪪 Hồ sơ của tôi' },
      { key:'ghinhan', label:'📝 Ghi nhận CNKT' },
      { key:'doipin', label:'🔑 Đổi mật khẩu' },
    ];
    root.innerHTML = topbar('Đăng nhập: ' + emp.hoTen, tabs) + toastHtml();
    bindTopbar(tabs, renderEmployeeApp);
    const content = document.getElementById('tab-content');
    if (state.tab === 'hoso') renderEmployeeProfile(content, emp);
    if (state.tab === 'ghinhan') renderEmployeeRecord(content, emp);
    if (state.tab === 'doipin') renderEmployeeChangePin(content, emp);
  }

  async function renderEmployeeProfile(content, emp){
    content.innerHTML = `<div class="empty">Đang tải dữ liệu…</div>`;
    const h = await ensureHours(emp.id);
    const st = statusOf(h.hours, emp);
    const ci = cycleInfo(emp);
    const pct = Math.min(100, Math.round((h.hours/REQUIRED_HOURS)*100));
    const uName = (state.config.units.find(u=>u.id===emp.donViId)||{}).name || '—';
    const myPending = state.pending.filter(p=>p.empId===emp.id).sort((a,b)=> b.submittedAt.localeCompare(a.submittedAt));
    const myRejected = state.rejectedLog.filter(p=>p.empId===emp.id).sort((a,b)=> (b.rejectedAt||'').localeCompare(a.rejectedAt||''));
    const tongHop = h.activities.map(a=>({ ...a, _trangThai:'Đã duyệt', _moc: a.confirmedAt }))
      .concat(myPending.map(p=>({ ...p, _trangThai:'Chờ duyệt', _moc: p.submittedAt })))
      .concat(myRejected.map(p=>({ ...p, _trangThai:'Từ chối/huỷ', _moc: p.rejectedAt })))
      .sort((a,b)=> (b.ngayThamGia||'').localeCompare(a.ngayThamGia||''));
    content.innerHTML = `
      <div class="card">
        <h3>Thông tin cá nhân</h3>
        <p><b>${emp.hoTen}</b> — ${emp.chucDanh}${emp.trinhDoCM?(' · '+emp.trinhDoCM):''}</p>
        <p class="muted">Khoa/Phòng: ${uName} &nbsp;|&nbsp; ${emp.gioiTinh||'—'}${emp.ngaySinh?(' · Sinh: '+fmtDate(emp.ngaySinh)):''} &nbsp;|&nbsp; Số CCHN: ${emp.soCCHN||'—'} &nbsp;|&nbsp; Ngày cấp: ${fmtDate(emp.ngayCapCCHN)} &nbsp;|&nbsp; Hạn chu kỳ 5 năm: ${fmtDate(ci.end)}</p>
        <div class="bar-bg" style="margin-top:10px"><div class="bar-fill" style="width:${pct}%;background:${st.color==='green'?'#1f7a4d':st.color==='amber'?'#b3760a':'#a3271f'}"></div></div>
        <p style="margin-top:6px"><span style="white-space:nowrap">${h.hours.toFixed(1)}&nbsp;/&nbsp;${REQUIRED_HOURS} giờ tín chỉ (${pct}%)</span> — <span class="pill ${st.color}">${st.label}</span></p>
        <div class="row-flex" style="margin-top:12px">
          <button id="emp-export-word" class="secondary">📝 Xuất Word hồ sơ của tôi</button>
          <button id="emp-export-excel" class="secondary">📊 Xuất Excel hồ sơ của tôi</button>
        </div>
      </div>
      <div class="card">
        <h3>Tổng hợp tất cả các đợt đã lập phiếu (${tongHop.length})</h3>
        ${tongHop.length ? `<table><thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày tham gia</th><th>Giờ tín chỉ</th><th>Bằng chứng</th><th>Trạng thái</th><th>Lý do (nếu bị từ chối)</th></tr></thead>
        <tbody>${tongHop.map(t=>{
          const pillColor = t._trangThai==='Đã duyệt' ? 'green' : t._trangThai==='Chờ duyệt' ? 'amber' : 'red';
          const evidence = t.bangChungFile ? '📎 Có file' : (t.bangChung ? '🔗 ' + t.bangChung : '—');
          return `<tr><td>${t.loaiHinh}</td><td>${t.tenHoatDong}</td><td>${fmtDate(t.ngayThamGia)}</td><td>${t.soGioTinChi}</td><td>${evidence}</td><td><span class="pill ${pillColor}">${t._trangThai}</span></td><td style="font-size:12px">${t.lyDo||'—'}</td></tr>`;
        }).join('')}</tbody></table>`
        : `<div class="empty">Chưa có đợt nào được lập phiếu.</div>`}
      </div>
      <div class="card">
        <h3>Hoạt động CNKT đã được xác nhận</h3>
        <div class="search-row" style="align-items:center">
          <span class="muted" style="font-family:Arial,sans-serif">Từ ngày:</span>
          <input id="ep-from" type="date" style="max-width:160px" />
          <span class="muted">— đến —</span>
          <input id="ep-to" type="date" style="max-width:160px" />
          <button class="ghost small-btn" id="ep-clear">Xoá lọc</button>
          <button id="ep-apply">🔎 Lọc</button>
        </div>
        <p class="muted" id="ep-filter-desc" style="margin-top:6px"></p>
        <p class="muted" style="font-size:12px">(Bộ lọc ngày này áp dụng cho cả 3 bảng: Đã xác nhận, Đang chờ duyệt, Đã từ chối/huỷ ở dưới)</p>
        <div id="confirmed-wrap"></div>
      </div>
      <div class="card">
        <h3>Hoạt động đang chờ duyệt</h3>
        <div id="pending-wrap"></div>
      </div>
      <div class="card">
        <h3>Hoạt động đã bị từ chối / huỷ</h3>
        <div id="rejected-wrap"></div>
      </div>
    `;
    function dateInRange(ngay, fromQ, toQ){
      if (fromQ && ngay && ngay < fromQ) return false;
      if (toQ && ngay && ngay > toQ) return false;
      return true;
    }
    function filterDescText(fromQ, toQ){
      if (fromQ && toQ) return `Đang lọc: chỉ hiện hoạt động có ngày tham gia từ ${fmtDate(fromQ)} đến ${fmtDate(toQ)}.`;
      if (fromQ) return `Đang lọc: chỉ hiện hoạt động có ngày tham gia từ ${fmtDate(fromQ)} trở đi (không giới hạn ngày cuối).`;
      if (toQ) return `Đang lọc: chỉ hiện hoạt động có ngày tham gia đến hết ${fmtDate(toQ)}.`;
      return '';
    }
    function renderConfirmedTable(fromQ, toQ){
      const list = h.activities.filter(a=> dateInRange(a.ngayThamGia, fromQ, toQ));
      const tongLoc = list.reduce((s,a)=> s+(parseFloat(a.soGioTinChi)||0), 0);
      const wrap = document.getElementById('confirmed-wrap');
      const filterDesc = filterDescText(fromQ, toQ);
      wrap.innerHTML = list.length ? `<table><thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày</th><th>Giờ tín chỉ</th><th>Bằng chứng</th></tr></thead>
        <tbody>${list.map(a=>`<tr><td>${a.loaiHinh}</td><td>${a.tenHoatDong}</td><td>${fmtDate(a.ngayThamGia)}</td><td>${a.soGioTinChi}</td><td>${a.bangChungFile? '📎 Có file' : (a.bangChung? '🔗 ' + a.bangChung : '—')}</td></tr>`).join('')}
        <tr><td colspan="4" style="text-align:right;font-weight:bold">Tổng cộng</td><td style="font-weight:bold">${tongLoc.toFixed(1)} giờ</td></tr></tbody></table>`
        : `<div class="empty">Không có hoạt động đã xác nhận phù hợp${filterDesc ? ' với bộ lọc trên' : ''}.</div>`;
    }
    function renderPendingTable(fromQ, toQ){
      const list = myPending.filter(p=> dateInRange(p.ngayThamGia, fromQ, toQ));
      const wrap = document.getElementById('pending-wrap');
      const filterDesc = filterDescText(fromQ, toQ);
      wrap.innerHTML = list.length ? `<table><thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày</th><th>Giờ</th><th>Bằng chứng</th><th>Trạng thái</th><th></th></tr></thead>
        <tbody>${list.map(p=>`<tr><td>${p.loaiHinh}</td><td>${p.tenHoatDong}</td><td>${fmtDate(p.ngayThamGia)}</td><td>${p.soGioTinChi}</td><td>${p.bangChungFile? '📎 Có file' : (p.bangChung? '🔗 ' + p.bangChung : '—')}</td><td><span class="pill amber">Chờ duyệt</span></td>
          <td><button class="ghost small-btn" data-edit-pending="${p.id}">✏️ Sửa</button> <button class="ghost small-btn" data-del-pending="${p.id}">🗑️ Xoá</button></td></tr>`).join('')}</tbody></table>`
        : `<div class="empty">Không có hoạt động đang chờ duyệt${filterDesc ? ' phù hợp với bộ lọc trên' : ''}.</div>`;
      wrap.querySelectorAll('[data-edit-pending]').forEach(b=>{
        b.onclick = ()=> openEditPendingModal(b.getAttribute('data-edit-pending'), ()=> renderEmployeeProfile(content, emp));
      });
      wrap.querySelectorAll('[data-del-pending]').forEach(b=>{
        b.onclick = async ()=>{
          if (!confirm('Xoá hoạt động này khỏi danh sách chờ duyệt?')) return;
          state.pending = state.pending.filter(p=>p.id!==b.getAttribute('data-del-pending'));
          await savePending();
          showToast('Đã xoá hoạt động.');
          renderEmployeeProfile(content, emp);
        };
      });
    }
    function renderRejectedTable(fromQ, toQ){
      const list = myRejected.filter(p=> dateInRange(p.ngayThamGia, fromQ, toQ));
      const wrap = document.getElementById('rejected-wrap');
      const filterDesc = filterDescText(fromQ, toQ);
      wrap.innerHTML = list.length ? `<table><thead><tr><th>Hình thức</th><th>Tên hoạt động</th><th>Ngày</th><th>Giờ</th><th>Bằng chứng</th><th>Ngày từ chối</th><th>Lý do</th></tr></thead>
        <tbody>${list.map(p=>`<tr><td>${p.loaiHinh}</td><td>${p.tenHoatDong}</td><td>${fmtDate(p.ngayThamGia)}</td><td>${p.soGioTinChi}</td><td>${p.bangChungFile? '📎 Có file' : (p.bangChung? '🔗 ' + p.bangChung : '—')}</td><td>${fmtDate(p.rejectedAt)}</td><td style="font-size:12px">${p.lyDo||'—'}</td></tr>`).join('')}</tbody></table>`
        : `<div class="empty">Không có hoạt động bị từ chối/huỷ${filterDesc ? ' phù hợp với bộ lọc trên' : ''}.</div>`;
    }
    function applyDateFilter(){
      const fromQ = document.getElementById('ep-from').value;
      const toQ = document.getElementById('ep-to').value;
      const filterDesc = filterDescText(fromQ, toQ);
      document.getElementById('ep-filter-desc').textContent = filterDesc ? ('🔎 ' + filterDesc) : '';
      renderConfirmedTable(fromQ, toQ);
      renderPendingTable(fromQ, toQ);
      renderRejectedTable(fromQ, toQ);
    }
    document.getElementById('ep-from').onchange = applyDateFilter;
    document.getElementById('ep-to').onchange = applyDateFilter;
    document.getElementById('ep-apply').onclick = applyDateFilter;
    document.getElementById('ep-clear').onclick = ()=>{ document.getElementById('ep-from').value=''; document.getElementById('ep-to').value=''; applyDateFilter(); };
    applyDateFilter();
    document.getElementById('emp-export-word').onclick = ()=>{
      const rows = h.activities.map(a=>[a.loaiHinh, a.tenHoatDong, fmtDate(a.ngayThamGia), a.soGioTinChi, 'Đã xác nhận'])
        .concat(myPending.map(p=>[p.loaiHinh, p.tenHoatDong, fmtDate(p.ngayThamGia), p.soGioTinChi, 'Chờ duyệt']));
      const tongXacNhan = h.activities.reduce((s,a)=> s+(parseFloat(a.soGioTinChi)||0), 0);
      const tongChoDuyet = myPending.reduce((s,p)=> s+(parseFloat(p.soGioTinChi)||0), 0);
      const summaryTable = {
        title: 'Tổng hợp giờ tín chỉ',
        headers: ['Đã xác nhận', 'Đang chờ duyệt', 'Tổng cộng', 'Yêu cầu chu kỳ 5 năm'],
        values: [tongXacNhan.toFixed(1) + ' giờ', tongChoDuyet.toFixed(1) + ' giờ', (tongXacNhan+tongChoDuyet).toFixed(1) + ' giờ', REQUIRED_HOURS + ' giờ']
      };
      exportWordTable('Hồ sơ Cập nhật kiến thức y khoa liên tục',
        ['Hình thức','Tên hoạt động','Ngày','Giờ tín chỉ','Trạng thái'], rows,
        'ho_so_cnkt_' + emp.hoTen.replace(/\s+/g,'_') + '_' + todayISO() + '.doc',
        { trichYeu: 'Của: ' + emp.hoTen + ' (' + (emp.gioiTinh||'—') + (emp.ngaySinh?(', sinh '+fmtDate(emp.ngaySinh)):'') + ') — ' + emp.chucDanh + (uName!=='—'? (' — ' + uName) : '') + ' — Số CCHN: ' + (emp.soCCHN||'—') + ', cấp ngày ' + fmtDate(emp.ngayCapCCHN), summaryTable: summaryTable });
    };
    document.getElementById('emp-export-excel').onclick = ()=>{
      const rows = [];
      h.activities.forEach(a=> rows.push([a.loaiHinh, a.tenHoatDong, fmtDate(a.ngayThamGia), a.soGioTinChi, 'Đã xác nhận']));
      myPending.forEach(p=> rows.push([p.loaiHinh, p.tenHoatDong, fmtDate(p.ngayThamGia), p.soGioTinChi, 'Chờ duyệt']));
      exportXlsxGeneric(["Hình thức","Tên hoạt động","Ngày","Giờ tín chỉ","Trạng thái"], rows, 'ho_so_cnkt_' + emp.hoTen.replace(/\s+/g,'_') + '_' + todayISO() + '.xlsx', 'HoSoCaNhan');
    };
  }

    let fileRemoved = false;

    function renderCurrentFileBlock(){
      const box = overlay.querySelector('#ep-file-current');
      if (!pendingFile){ box.innerHTML = `<span class="muted">Chưa có ảnh/file đính kèm.</span>`; return; }
      if (pendingFile.type === 'image'){
        box.innerHTML = `<img src="${pendingFile.dataUrl}" style="max-height:140px;border:1px solid var(--line);border-radius:6px" /><br>
          <button type="button" class="ghost small-btn" id="ep-remove-file" style="margin-top:6px">🗑️ Xoá file này</button>`;
      } else {
        box.innerHTML = `<span class="pill gray">📄 ${pendingFile.name||'File PDF'}</span>
          <button type="button" class="ghost small-btn" id="ep-remove-file" style="margin-left:8px">🗑️ Xoá file này</button>`;
      }
      overlay.querySelector('#ep-remove-file').onclick = ()=>{ pendingFile = null; fileRemoved = true; renderCurrentFileBlock(); };
    }
    renderCurrentFileBlock();

    overlay.querySelector('#ep-tool-camera').onclick = ()=> overlay.querySelector('#ep-file-camera').click();
    overlay.querySelector('#ep-tool-file').onclick = ()=> overlay.querySelector('#ep-file-picker').click();
    async function handleEpFile(e){
      const file = e.target.files[0];
      const preview = overlay.querySelector('#ep-file-preview');
      if (!file) return;
      preview.innerHTML = `<span class="muted">Đang xử lý và kiểm tra độ rõ của ảnh…</span>`;
      try {
        const f = await readFileAsCompressedDataURL(file);
        pendingFile = f; fileRemoved = false;
        let warningHtml = '';
        if (f.isBlurry){
          warningHtml = `<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:6px;padding:8px 10px;margin-bottom:6px">
            <b style="color:var(--amber)">⚠ Ảnh có thể bị mờ.</b>
            <label style="display:flex;align-items:center;gap:6px;font-family:Arial,sans-serif;font-size:12.5px;font-weight:normal;margin-top:4px">
              <input type="checkbox" id="ep-blur-confirm" style="width:auto" /> Tôi xác nhận ảnh này vẫn đọc rõ được
            </label></div>`;
        }
        preview.innerHTML = f.type==='image'
          ? warningHtml + `<img src="${f.dataUrl}" style="max-height:140px;border:1px solid var(--line);border-radius:6px" />`
          : `<span class="pill gray">📄 ${f.name}</span>`;
        if (f.isBlurry) overlay.querySelector('#ep-blur-confirm').onchange = (ev)=>{ pendingFile.blurConfirmed = ev.target.checked; };
        renderCurrentFileBlock();
        overlay.querySelector('#ep-file-current').insertAdjacentHTML('beforeend', '<p class="muted" style="margin-top:4px">↑ File mới sẽ thay thế file cũ khi Lưu.</p>');
      } catch(err){
        preview.innerHTML = `<div style="color:var(--red);font-size:13px">⚠ ${err.message}</div>`;
      }
    }
    overlay.querySelector('#ep-file-camera').onchange = handleEpFile;
    overlay.querySelector('#ep-file-picker').onchange = handleEpFile;

    overlay.querySelector('#ep-cancel').onclick = ()=> overlay.remove();
    overlay.querySelector('#ep-save').onclick = async ()=>{
      const errBox = overlay.querySelector('#ep-error');
      errBox.style.display = 'none';
      const ten = overlay.querySelector('#ep-ten').value.trim();
      const gio = parseFloat(overlay.querySelector('#ep-gio').value);
      const bangChungText = overlay.querySelector('#ep-bangchung').value.trim();
      if (!ten || !gio || gio<=0){ errBox.textContent = '⚠ Vui lòng nhập đầy đủ tên hoạt động và số giờ tín chỉ hợp lệ.'; errBox.style.display='block'; return; }
      if (!bangChungText && !pendingFile){ errBox.textContent = '⚠ Vui lòng nhập bằng chứng hoặc đính kèm ảnh/file.'; errBox.style.display='block'; return; }
      if (pendingFile && pendingFile.isBlurry && !pendingFile.blurConfirmed){ errBox.textContent = '⚠ Ảnh có thể bị mờ — vui lòng xác nhận hoặc chọn ảnh khác.'; errBox.style.display='block'; return; }
      p.loaiHinh = overlay.querySelector('#ep-loaihinh').value;
      p.ngayThamGia = overlay.querySelector('#ep-ngay').value;
      p.tenHoatDong = ten;
      p.donViToChuc = overlay.querySelector('#ep-donvi').value.trim();
      p.soGioTinChi = gio;
      p.bangChung = bangChungText;
      p.bangChungFile = pendingFile ? pendingFile.dataUrl : '';
      p.bangChungFileType = pendingFile ? pendingFile.type : '';
      p.bangChungFileName = pendingFile ? pendingFile.name : '';
      p.bangChungFileBlurFlag = pendingFile ? !!pendingFile.isBlurry : false;
      await savePending();
      overlay.remove();
      showToast('Đã lưu thay đổi.');
      onDone();
    };
  }

  function buildSummaryTableHtml(summary){
    const title = summary.title || 'Tổng hợp';
    const cols = summary.headers.length;
    const widthPct = Math.floor(100/cols);
    return '<table class="summary" style="border-collapse:collapse;width:100%;margin-top:14px">' +
      '<tr><td colspan="' + cols + '" style="border:1px solid #444;background:#eaf3ec;font-weight:bold;padding:6px 9px;font-size:11.5pt">' + title + '</td></tr>' +
      '<tr>' + summary.headers.map(function(h){ return '<th style="border:1px solid #444;padding:6px 8px;font-size:11pt;background:#f3f9f4;color:#155c3a;width:'+widthPct+'%;text-align:center">'+h+'</th>'; }).join('') + '</tr>' +
      '<tr>' + summary.values.map(function(v){ return '<td style="border:1px solid #444;padding:7px 8px;font-size:12pt;font-weight:bold;text-align:center">'+v+'</td>'; }).join('') + '</tr>' +
      '</table>';
  }

  function vietnameseDateLong(iso){
    const d = new Date(iso || todayISO());
    return 'ngày ' + String(d.getDate()).padStart(2,'0') + ' tháng ' + String(d.getMonth()+1).padStart(2,'0') + ' năm ' + d.getFullYear();
  }

  function exportWordTable(title, headers, rows, filename, opts){
    opts = opts || {};
    const trichYeu = opts.trichYeu || '';
    const isWide = opts.landscape !== false && headers.length > 8;
    const pageCss = isWide
      ? "@page { size: A4 landscape; margin: 1.2cm; }"
      : "@page { size: A4; margin: 1.5cm; }";
    const dataFontSize = isWide ? '9.5pt' : '11.5pt';
    const styleBlock = pageCss + " body{font-family:'Times New Roman',serif;font-size:13pt;color:#000;} " +
      "table.kv{width:100%;border:none;} table.kv td{border:none;vertical-align:top;padding:0;} " +
      "table.data{border-collapse:collapse;width:100%;margin-top:14px;} table.data th,table.data td{border:1px solid #444;padding:5px 7px;font-size:" + dataFontSize + ";} " +
      "table.data th{background:#1f7a4d;color:#fff;font-weight:bold;} " +
      ".hd-org{text-align:center;font-weight:bold;font-size:12.5pt;line-height:1.35;} " +
      ".hd-sub{font-weight:normal;text-transform:none;} " +
      ".hd-line{display:inline-block;border-bottom:1px solid #000;width:38%;margin:4px 0;} " +
      ".hd-quoc{text-align:center;font-weight:bold;font-size:11.5pt;line-height:1.35;white-space:nowrap;} " +
      ".hd-tieungu{font-weight:normal;text-decoration:underline;} " +
      ".hd-place{font-style:italic;font-weight:normal;margin-top:14px;display:block;text-align:center;} " +
      ".doc-title{text-align:center;font-weight:bold;font-size:15pt;text-transform:uppercase;margin-top:22px;margin-bottom:2px;} " +
      ".doc-trichyeu{text-align:center;font-style:italic;margin-top:0;margin-bottom:6px;} " +
      ".sign-block{width:100%;border:none;margin-top:36px;} .sign-block td{border:none;text-align:center;font-weight:bold;vertical-align:top;}" +
      ".sign-note{font-style:italic;font-weight:normal;font-size:10.5pt;display:block;}";
    const tableHtml = '<table class="data"><thead><tr>' + headers.map(function(h){return '<th>'+h+'</th>';}).join('') + '</tr></thead><tbody>' +
      rows.map(function(r){ return '<tr>' + r.map(function(c){return '<td>'+c+'</td>';}).join('') + '</tr>'; }).join('') + '</tbody></table>' +
      (opts.summaryTable ? buildSummaryTableHtml(opts.summaryTable) : '');
    const headerHtml =
      '<table class="kv"><tr>' +
        '<td style="width:42%">' +
          '<div class="hd-org">BỆNH VIỆN ĐA KHOA<br>TRUNG TÂM TỈNH GIA LAI<br><span class="hd-sub">PHÒNG CHỈ ĐẠO TUYẾN</span></div>' +
          '<div style="text-align:center"><hr align="center" width="55%" size="1" color="#000000" style="border:none;border-top:1px solid #000;width:55%;margin:6px auto"></div>' +
          '<div style="text-align:center;font-weight:normal">Số: ……/BC-CNKT</div>' +
        '</td>' +
        '<td style="width:58%">' +
          '<div class="hd-quoc">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT&nbsp;NAM<br><span class="hd-tieungu">Độc lập&nbsp;-&nbsp;Tự do&nbsp;-&nbsp;Hạnh phúc</span></div>' +
          '<div class="hd-place">Gia Lai, ' + vietnameseDateLong(todayISO()) + '</div>' +
        '</td>' +
      '</tr></table>' +
      '<div class="doc-title">' + title + '</div>' +
      (trichYeu ? '<div class="doc-trichyeu">' + trichYeu + '</div>' : '');
    const signHtml =
      '<table class="sign-block"><tr>' +
        '<td style="width:50%">&nbsp;</td>' +
        '<td style="width:50%">TRƯỞNG PHÒNG CHỈ ĐẠO TUYẾN<br><span class="sign-note">(Ký, ghi rõ họ tên)</span><br><br><br><br></td>' +
      '</tr></table>';
    const html = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>" +
      "<head><meta charset='utf-8'><title>" + title + "</title><style>" + styleBlock + "</style></head>" +
      "<body>" + headerHtml + tableHtml + signHtml + "</body></html>";
    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  async function exportCSV(refDate){
    refDate = refDate || todayISO();
    const rows = [];
    let i = 0;
    await warmHoursCache(state.employees.map(e=>e.id));
    for (const emp of state.employees){
      const h = await ensureHoursAsOf(emp.id, refDate);
      const st = statusOf(h.hours, emp, refDate);
      const ci = cycleInfo(emp, refDate);
      const uName = (state.config.units.find(u=>u.id===emp.donViId)||{}).name || '';
      i++;
      rows.push([i, uName, emp.hoTen, emp.chucDanh, emp.trinhDoCM||'', emp.soCCHN||'', fmtDate(ci.start), fmtDate(ci.end), h.hours.toFixed(1), st.label]);
    }
    exportXlsxGeneric(["STT","Khoa/Phòng","Họ tên","Chức danh","Trình độ CM","Số CCHN","Ngày bắt đầu chu kỳ","Hạn chu kỳ","Giờ tín chỉ đạt được","Trạng thái"], rows, 'bao_cao_cnkt_toan_vien_' + refDate + '.xlsx', 'ToanVien');
  }

  function renderAdminApprove(content){
    const view = state.approveView || 'pending';
    const pendingCount = state.pending.length;
    const approvedCount = state.approvedLog.length;
    const rejectedCount = state.rejectedLog.length;
    const newEmpCount = state.employees.filter(e=>e.trangThaiNhanVien==='Chờ duyệt').length;
    if (!state.approveFilter) state.approveFilter = { name: '', unitId: '', fromDate: '', toDate: '' };
    content.innerHTML = `
      <div class="row-flex" style="margin-bottom:14px">
        <button class="${view==='pending'?'':'secondary'}" data-view-switch="pending">⏳ Chưa duyệt (${pendingCount})</button>
        <button class="${view==='approved'?'':'secondary'}" data-view-switch="approved">✅ Đã duyệt (${approvedCount})</button>
        <button class="${view==='rejected'?'':'secondary'}" data-view-switch="rejected">❌ Đã từ chối / huỷ (${rejectedCount})</button>
        <button class="${view==='newemp'?'':'secondary'}" data-view-switch="newemp">👤 Nhân viên mới (${newEmpCount})</button>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="search-row" style="margin-bottom:8px">
          <input id="af-name" placeholder="Tìm theo tên nhân viên..." value="${state.approveFilter.name}" style="max-width:280px" />
          <div id="af-unit-ssel" style="max-width:280px;flex:1"></div>
        </div>
        <div class="search-row" style="margin-bottom:0;align-items:center">
          <span class="muted" style="font-family:Arial,sans-serif">Ngày tham gia hoạt động:</span>
          <input id="af-from" type="date" value="${state.approveFilter.fromDate}" style="max-width:160px" /> 
          <span class="muted">— đến —</span>
          <input id="af-to" type="date" value="${state.approveFilter.toDate}" style="max-width:160px" />
          <button id="af-apply">🔎 Lọc</button>
          <button class="ghost small-btn" id="af-clear-date">Xoá ngày</button>
        </div>
        <p class="muted" id="approve-filter-desc" style="margin-top:8px;margin-bottom:0"></p>
      </div>
      <div id="approve-list-wrap"></div>
    `;
    content.querySelectorAll('[data-view-switch]').forEach(b=>{
      b.onclick = ()=>{ state.approveView = b.getAttribute('data-view-switch'); renderAdminApprove(content); };
    });
    const unitFilterOptions = [{ id:'', label:'Tất cả khoa/phòng (toàn viện)', isAction:true }]
      .concat(state.config.units.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(u=>({ id:u.id, label:u.name })));
    createSearchableSelect(document.getElementById('af-unit-ssel'), unitFilterOptions, {
      placeholder: 'Gõ để tìm Khoa/Phòng...',
      initialId: state.approveFilter.unitId,
      onSelect: (id)=>{ state.approveFilter.unitId = id; renderListWrap(); document.getElementById('approve-filter-desc').textContent = '🔎 Đang xem: ' + scopeLabel(); }
    });
    function applyFilters(){
      state.approveFilter.name = document.getElementById('af-name').value;
      state.approveFilter.fromDate = document.getElementById('af-from').value;
      state.approveFilter.toDate = document.getElementById('af-to').value;
      renderListWrap();
      document.getElementById('approve-filter-desc').textContent = '🔎 Đang xem: ' + scopeLabel();
    }
    document.getElementById('af-name').oninput = applyFilters;
    document.getElementById('af-name').onkeydown = (e)=>{ if (e.key==='Enter') applyFilters(); };
    document.getElementById('af-from').onchange = applyFilters;
    document.getElementById('af-to').onchange = applyFilters;
    document.getElementById('af-apply').onclick = applyFilters;
    document.getElementById('af-clear-date').onclick = ()=>{ state.approveFilter.fromDate=''; state.approveFilter.toDate=''; renderAdminApprove(content); };

    function filterList(arr){
      const nameQ = state.approveFilter.name.trim().toLowerCase();
      const unitQ = state.approveFilter.unitId;
      const fromQ = state.approveFilter.fromDate;
      const toQ = state.approveFilter.toDate;
      return arr.filter(p=>{
        const ten = (p.empName || p.hoTen || '').toLowerCase();
        if (nameQ && !ten.includes(nameQ)) return false;
        if (unitQ && p.donViId!==unitQ) return false;
        if (fromQ && p.ngayThamGia && p.ngayThamGia < fromQ) return false;
        if (toQ && p.ngayThamGia && p.ngayThamGia > toQ) return false;
        return true;
      });
    }
    function scopeLabel(){
      const u = state.config.units.find(x=>x.id===state.approveFilter.unitId);
      const parts = [];
      if (u) parts.push('Khoa/Phòng: ' + u.name);
      if (state.approveFilter.name.trim()) parts.push('Tên: "' + state.approveFilter.name.trim() + '"');
      if (state.approveFilter.fromDate || state.approveFilter.toDate) parts.push('Ngày: ' + (state.approveFilter.fromDate?fmtDate(state.approveFilter.fromDate):'…') + ' đến ' + (state.approveFilter.toDate?fmtDate(state.approveFilter.toDate):'…'));
      return parts.length ? '(' + parts.join(' — ') + ')' : '(Toàn viện)';
    }
    document.getElementById('approve-filter-desc').textContent = '🔎 Đang xem: ' + scopeLabel();

    function renderListWrap(){
      const wrap = document.getElementById('approve-list-wrap');

      if (view === 'pending'){
        const list = filterList(state.pending.slice().sort((a,b)=> a.submittedAt.localeCompare(b.submittedAt)));
        wrap.innerHTML = !list.length ? `<div class="card"><div class="empty">Không có hoạt động phù hợp.</div></div>` : `
          <div class="card">
            <div class="row-flex" style="margin-bottom:10px">
              <button class="secondary" id="btn-export-pending-word">📝 Xuất Word</button>
              <button class="secondary" id="btn-export-pending-excel">📊 Xuất Excel</button>
            </div>
            <table>
              <thead><tr><th>Khoa/Phòng</th><th>Nhân viên</th><th>Hình thức</th><th>Hoạt động</th><th>Ngày</th><th>Giờ</th><th>Bằng chứng</th><th></th></tr></thead>
              <tbody>${list.map(p=>`
                <tr>
                  <td>${p.donViName}</td><td>${p.empName}</td><td>${p.loaiHinh}</td><td>${p.tenHoatDong}</td>
                  <td>${fmtDate(p.ngayThamGia)}</td><td>${p.soGioTinChi}</td>
                  <td style="max-width:180px;font-size:12px">${p.bangChung||'—'}${evidenceFileHtml(p)}</td>
                  <td><button class="small-btn" data-approve="${p.id}">✅ Xác nhận</button> <button class="ghost small-btn" data-reject="${p.id}">❌ Từ chối</button></td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>
        `;
        if (list.length){
          document.getElementById('btn-export-pending-word').onclick = ()=>{
            const headers = ['Khoa/Phòng','Nhân viên','Hình thức','Hoạt động','Ngày','Giờ','Bằng chứng'];
            const rows = list.map(p=>[p.donViName, p.empName, p.loaiHinh, p.tenHoatDong, fmtDate(p.ngayThamGia), p.soGioTinChi, p.bangChung||'—']);
            exportWordTable('Danh sách hoạt động chờ duyệt', headers, rows, 'cnkt_cho_duyet_'+todayISO()+'.doc', { trichYeu: scopeLabel() });
          };
          document.getElementById('btn-export-pending-excel').onclick = ()=>{
            exportCsvGeneric(['Khoa/Phòng','Nhân viên','Hình thức','Hoạt động','Ngày','Giờ','Bằng chứng'],
              list.map(p=>[p.donViName, p.empName, p.loaiHinh, p.tenHoatDong, fmtDate(p.ngayThamGia), p.soGioTinChi, p.bangChung||'']),
              'cnkt_cho_duyet_'+todayISO()+'.csv');
          };
        }
        wrap.querySelectorAll('[data-view-file-rec]').forEach(b=>{
          b.onclick = ()=>{
            const rec = state.pending.find(p=>p.id===b.getAttribute('data-view-file-rec'));
            if (rec) openFilePreviewModal(rec.bangChungFile, rec.bangChungFileType, rec.bangChungFileName);
          };

  function exportXlsxGeneric(headers, rows, filename, sheetName){
    const data = [headers].concat(rows);
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = headers.map((h, i)=>{
      let maxLen = String(h).length;
      rows.forEach(r=>{ const v = String(r[i]==null?'':r[i]); if (v.length > maxLen) maxLen = v.length; });
      return { wch: Math.min(Math.max(maxLen + 2, 10), 45) };
    });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName || 'DuLieu');
    XLSX.writeFile(wb, filename);
  }
  function exportCsvGeneric(headers, rows, filename){ exportXlsxGeneric(headers, rows, filename.replace(/\.csv$/,'.xlsx'), 'DuLieu'); }

  function evidenceFileHtml(rec){
    if (!rec.bangChungFile) return '';
    const warn = rec.bangChungFileBlurFlag ? ' <span class="pill amber" title="Nhân viên xác nhận ảnh vẫn đọc rõ được dù hệ thống nghi mờ">⚠ Nghi mờ</span>' : '';
    return `<br><button class="ghost small-btn" style="margin-top:4px" data-view-file-rec="${rec.id}">📎 Xem file</button>${warn}`;
  }

  function findCol(row, mustInclude){
    const keys = Object.keys(row);
    return keys.find(k => mustInclude.every(s => k.toLowerCase().includes(s)));
  }
  function parseExcelDate(v){
    if (!v) return '';
    if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
    const s = String(v).trim();
    let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    return '';
  }
  function randPin(){ return String(Math.floor(1000 + Math.random()*9000)); }

  async function processImportRows(rows, resultBox){
    let added=0, updated=0, newUnits=0, skipped=0;
    const createdUnitsList = [];
    for (const row of rows){
      const kHoTen = findCol(row, ['họ','tên']) || findCol(row,['ho','ten']);
      const kCCHN = Object.keys(row).find(k => k.toLowerCase().includes('cchn') && !k.toLowerCase().includes('ngày') && !k.toLowerCase().includes('cấp'));
      const kNgayCap = findCol(row, ['ngày','cấp']);
      const kNgayBatDau = findCol(row, ['bắt đầu']) || findCol(row,['chu kỳ']);
      const kChucDanh = findCol(row, ['chức danh']);
      const kTrinhDo = findCol(row, ['trình độ']);
      const kDonVi = findCol(row, ['khoa']) || findCol(row, ['phòng']);
      const kGioiTinh = findCol(row, ['giới tính']) || findCol(row, ['giới']);
      const kNgaySinh = findCol(row, ['ngày sinh']) || findCol(row, ['ngày','sinh']);

      const hoTen = kHoTen ? String(row[kHoTen]).trim() : '';
      if (!hoTen){ skipped++; continue; }
      const soCCHN = kCCHN ? String(row[kCCHN]).trim() : '';
      let chucDanhRaw = kChucDanh ? String(row[kChucDanh]).trim() : '';
      chucDanhRaw = chucDanhRaw || 'Chưa xác định';
      let trinhDoRaw = kTrinhDo ? String(row[kTrinhDo]).trim() : '';
      const donViNameRaw = kDonVi ? String(row[kDonVi]).trim() : '';
      const ngayCap = kNgayCap ? parseExcelDate(row[kNgayCap]) : '';
      const ngayBatDau = kNgayBatDau ? parseExcelDate(row[kNgayBatDau]) : (ngayCap || '');
      const gioiTinhRaw = kGioiTinh ? String(row[kGioiTinh]).trim() : '';
      const ngaySinhRaw = kNgaySinh ? parseExcelDate(row[kNgaySinh]) : '';

      let unitId = '';
      if (donViNameRaw && donViNameRaw !== 'Chưa xác định'){
        let unit = state.config.units.find(u => u.name.toLowerCase() === donViNameRaw.toLowerCase());
        if (!unit){
          unit = { id: uid('unit'), name: donViNameRaw, pin: randPin() };
          state.config.units.push(unit);
          createdUnitsList.push(unit);
          newUnits++;
        }
        unitId = unit.id;
      }

      let emp = state.employees.find(e => e.hoTen.toLowerCase()===hoTen.toLowerCase() && (e.soCCHN||'').toLowerCase()===soCCHN.toLowerCase());
      const data = {
        hoTen, soCCHN, chucDanh: chucDanhRaw, trinhDoCM: trinhDoRaw,
        gioiTinh: gioiTinhRaw, ngaySinh: ngaySinhRaw,
        ngayCapCCHN: ngayCap, ngayBatDauChuKy: ngayBatDau,
        donViId: unitId || (emp ? emp.donViId : ''), trangThaiNhanVien: 'Đã duyệt',
      };
      if (emp){ Object.assign(emp, data); updated++; }
      else { state.employees.push(Object.assign({ id: uid('emp'), createdAt: todayISO() }, data)); added++; }
    }
    await saveConfig();
    await saveEmployees();
    hoursCache = {};
    resultBox.innerHTML = `
      <div class="card" style="background:#f4f2ec">
        <h3>Kết quả nhập dữ liệu</h3>
        <p>Đã thêm mới: <b>${added}</b> nhân viên &nbsp;|&nbsp; Đã cập nhật: <b>${updated}</b> nhân viên &nbsp;|&nbsp; Bỏ qua (thiếu họ tên): <b>${skipped}</b></p>
        ${newUnits? `<p>Đã tự động tạo <b>${newUnits}</b> Khoa/Phòng mới. Vui lòng cung cấp mã PIN dưới đây cho từng đơn vị để họ đăng nhập:</p>
        <table><thead><tr><th>Khoa/Phòng</th><th>Mã PIN</th></tr></thead><tbody>
        ${createdUnitsList.map(u=>`<tr><td>${u.name}</td><td><b>${u.pin}</b></td></tr>`).join('')}
        </tbody></table>` : ''}
      </div>
    `;
  }

        ngayCapCCHN: row.ngayCapCCHN || '', ngayBatDauChuKy: row.ngayCapCCHN || '', createdAt: todayISO(),

    state.config.seeded = true;
    await saveConfig();

      });
    }
    if (window.__cnktConfigMissing){
      root.innerHTML = `
        <div style="max-width:680px;margin:50px auto;padding:28px 32px;border:1px solid #ddd7c8;border-radius:10px;background:#fff;font-family:Arial,sans-serif;line-height:1.6">
          <h2 style="color:#a3271f;margin-top:0">⚠ Chưa cấu hình Firebase</h2>
          <p>Dán toàn bộ đoạn <code>firebaseConfig</code> mà Firebase Console đưa cho anh (dán nguyên cả dòng <code>const firebaseConfig = {...};</code> cũng được) vào ô dưới đây, rồi bấm <b>"Lưu &amp; Tiếp tục"</b> — không cần sửa file, không cần mở trình soạn thảo.</p>
          <textarea id="fb-config-input" rows="9" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid #c6bfac;border-radius:6px;box-sizing:border-box" placeholder='const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};'></textarea>
          <div id="fb-config-error" style="color:#a3271f;margin-top:10px;font-weight:700;display:none"></div>
          <div style="margin-top:16px">
            <button id="fb-config-save" style="padding:10px 20px;border-radius:6px;border:1px solid #14335c;background:linear-gradient(180deg,#2b5e8f,#14335c);color:#fff;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">💾 Lưu &amp; Tiếp tục</button>
          </div>
          <p style="margin-top:20px;font-size:13px;color:#6b6457">Chưa có đoạn này? Vào <a href="https://console.firebase.google.com" target="_blank" rel="noopener">Firebase Console</a> → tạo project miễn phí → bật Firestore Database → Project Overview → bấm biểu tượng <code>&lt;/&gt;</code> (Web) → Register app → copy đoạn config được đưa ra.</p>
        </div>
      `;
      document.getElementById('fb-config-save').onclick = ()=>{
        const text = document.getElementById('fb-config-input').value.trim();
        const errBox = document.getElementById('fb-config-error');
        errBox.style.display = 'none';
        try {
          window.__cnktSaveFirebaseConfig(text);
          location.reload();
        } catch(e){
          errBox.style.display = 'block';
          errBox.textContent = '❌ ' + (e.message || 'Có lỗi xảy ra, vui lòng kiểm tra lại nội dung đã dán.');
        }
      };
      return;
    }
    await loadAll();
    await seedDemoData();
    render();
  })();
})();
</script>

</body>
</html>
